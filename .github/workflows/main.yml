name: MAUI Build & Release Android

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    - name: Restore Dependencies
      run: dotnet restore

    # Estraiamo il Keystore dai Secrets
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" > keystore_base64.txt
        certutil -decode keystore_base64.txt Fabrizio.keystore

    # Pubblicazione Android (Genera l'APK)
    - name: Publish Android
      run: |
        dotnet publish -f net10.0-android -c Release `
        /p:AndroidKeyStore=true `
        /p:AndroidSigningKeyStore="${{ github.workspace }}\Fabrizio.keystore" `
        /p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD }}" `
        /p:AndroidSigningKeyAlias="${{ secrets.KEY_ALIAS }}" `
        /p:AndroidSigningKeyPass="${{ secrets.KEYSTORE_PASSWORD }}"
    
    # Carica l'APK come Artifact (così puoi scaricarlo)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodiceFiscale-Android
        path: |
          **/*-Signed.apk
